<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dan Kashtan</title>
<meta name="description" content="Dan Kashtan - new EP, out now.">

<meta property="og:title" content="Dan Kashtan">
<meta property="og:description" content="Somewhere, another reality is still awake.">
<meta property="og:image" content="dan.png">
<meta name="twitter:card" content="summary">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --coral: #d9584e;
    --coral-dark: #b5473e;
    --ink: #0b0f1e;
    --sunset-1: #0b0f1e;
    --sunset-2: #2a1830;
    --sunset-3: #7a3140;
    --sunset-4: #d9634a;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background: var(--ink);
  }

  body{
    font-family:'Poppins', system-ui, -apple-system, sans-serif;
    color:#f4f1ee;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* background - absolute (not fixed) so it stretches across the full scrollable
     page height and object-fit:cover always fills it with no gaps, even if the
     page grows taller than one screen */
  .bg-gradient{
    position:absolute;
    inset:0;
    z-index:-3;
    background:
      radial-gradient(120% 60% at 50% 0%, var(--sunset-2) 0%, transparent 60%),
      linear-gradient(180deg, var(--sunset-1) 0%, var(--sunset-2) 35%, var(--sunset-3) 68%, var(--sunset-4) 100%);
  }

  .bg-photo{
    position:absolute;
    top:0;
    left:0;
    right:0;
    width:100%;
    height:100dvh;
    object-fit:cover;
    z-index:-2;
    opacity:1;
  }

  main.card{
    width:100%;
    max-width:460px;
    min-height:100dvh;
    padding:calc(36px + var(--safe-t)) 24px calc(28px + var(--safe-b));
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
  }

  .avatar-wrap{
    width:112px;
    height:112px;
    border-radius:50%;
    padding:3px;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(217,88,78,0.6));
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    flex:none;
  }

  .avatar, .avatar-fallback{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .avatar-fallback{
    display:none;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #3a2a3d, #7a3140);
    font-family:'Cormorant Garamond', serif;
    font-size:34px;
    letter-spacing:2px;
    color:#f4f1ee;
  }

  h1.name{
    margin:18px 0 0;
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(26px, 7vw, 32px);
    letter-spacing:1px;
    text-align:center;
  }

  p.tagline{
    margin:8px 0 0;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(14px, 4vw, 16px);
    color:rgba(244,241,238,0.75);
    text-align:center;
    max-width:320px;
    line-height:1.5;
  }

  .links{
    width:100%;
    margin-top:32px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .link-group{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .link-label{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(244,241,238,0.55);
    text-align:center;
  }

  .link-row{
    display:flex;
    justify-content:center;
    gap:14px;
  }

  .btn{
    width:52px;
    height:52px;
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:#fff;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px) saturate(130%);
    -webkit-backdrop-filter: blur(10px) saturate(130%);
    box-shadow: 0 6px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform .12s ease, box-shadow .12s ease;
    -webkit-user-select:none;
    user-select:none;
  }

  .btn:active{
    transform: translateY(2px) scale(0.96);
    box-shadow: 0 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .btn svg{ width:23px; height:23px; flex:none; }

  .btn-spotify{
    background: linear-gradient(180deg, rgba(29,185,84,0.28) 0%, rgba(6,26,16,0.62) 100%);
    border-color: rgba(29,185,84,0.36);
  }

  .btn-youtube{
    background: linear-gradient(180deg, rgba(216,52,44,0.28) 0%, rgba(40,8,6,0.62) 100%);
    border-color: rgba(216,52,44,0.36);
  }

  .btn-apple{
    background: linear-gradient(180deg, rgba(251,42,85,0.28) 0%, rgba(45,6,18,0.62) 100%);
    border-color: rgba(251,42,85,0.36);
  }

  .socials{
    display:flex;
    gap:16px;
    margin-top:34px;
  }

  .social-btn{
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(244,241,238,0.06);
    border:1.3px solid rgba(244,241,238,0.35);
    color:#f4f1ee;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }

  .social-btn:active{ transform: scale(0.92); background:rgba(244,241,238,0.14); border-color:rgba(244,241,238,0.55); }

  .social-btn svg{ width:20px; height:20px; }

  footer.foot{
    margin-top:auto;
    padding-top:30px;
    font-size:11px;
    letter-spacing:0.5px;
    color:rgba(244,241,238,0.35);
    text-align:center;
    line-height:1.7;
  }

  footer.foot .credit{
    color:rgba(244,241,238,0.22);
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .avatar-wrap{ animation: fadeUp .6s ease both; animation-delay: .05s; }
  h1.name{ animation: fadeUp .6s ease both; animation-delay: .15s; }
  p.tagline{ animation: fadeUp .6s ease both; animation-delay: .25s; }
  .links .link-group:nth-child(1){ animation: fadeUp .6s ease both; animation-delay: .35s; }
  .links .link-group:nth-child(2){ animation: fadeUp .6s ease both; animation-delay: .42s; }
  .links .link-group:nth-child(3){ animation: fadeUp .6s ease both; animation-delay: .49s; }
  .socials{ animation: fadeUp .6s ease both; animation-delay: .58s; }
  footer.foot{ animation: fadeUp .6s ease both; animation-delay: .66s; }

  @media (prefers-reduced-motion: reduce){
    .avatar-wrap, h1.name, p.tagline, .links .link-group, .socials, footer.foot{
      animation:none;
      opacity:1;
      transform:none;
    }
  }
</style>
</head>
