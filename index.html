<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dan Kashtan</title>
<meta name="description" content="Dan Kashtan - new EP, out now.">

<meta property="og:title" content="Dan Kashtan">
<meta property="og:description" content="Where your mind goes when the noise stops.">
<meta property="og:image" content="dan.png">
<meta name="twitter:card" content="summary">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --coral: #d9584e;
    --coral-dark: #b5473e;
    --ink: #0b0f1e;
    --sunset-1: #0b0f1e;
    --sunset-2: #2a1830;
    --sunset-3: #7a3140;
    --sunset-4: #d9634a;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background: var(--ink);
  }

  body{
    font-family:'Poppins', system-ui, -apple-system, sans-serif;
    color:#f4f1ee;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* background - absolute (not fixed) so it stretches across the full scrollable
     page height and object-fit:cover always fills it with no gaps, even if the
     page grows taller than one screen */
  .bg-gradient{
    position:absolute;
    inset:0;
    z-index:-3;
    background:
      radial-gradient(120% 60% at 50% 0%, var(--sunset-2) 0%, transparent 60%),
      linear-gradient(180deg, var(--sunset-1) 0%, var(--sunset-2) 35%, var(--sunset-3) 68%, var(--sunset-4) 100%);
  }

  .bg-photo{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0.85;
  }

  .bg-overlay{
    position:absolute;
    inset:0;
    z-index:-1;
    background: linear-gradient(180deg, rgba(11,15,30,0.45) 0%, rgba(11,15,30,0.15) 30%, rgba(11,15,30,0.1) 55%, rgba(11,15,30,0.45) 100%);
  }

  .stars{
    position:absolute;
    inset:0;
    z-index:-2;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 15%, rgba(255,255,255,0.8) 50%, transparent 100%),
      radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.6) 50%, transparent 100%),
      radial-gradient(1.2px 1.2px at 45% 25%, rgba(255,255,255,0.7) 50%, transparent 100%),
      radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.5) 50%, transparent 100%),
      radial-gradient(1.4px 1.4px at 10% 35%, rgba(255,255,255,0.6) 50%, transparent 100%),
      radial-gradient(1px 1px at 60% 8%, rgba(255,255,255,0.5) 50%, transparent 100%),
      radial-gradient(1.2px 1.2px at 30% 42%, rgba(255,255,255,0.5) 50%, transparent 100%);
    background-repeat:no-repeat;
  }

  main.card{
    width:100%;
    max-width:460px;
    min-height:100dvh;
    padding:calc(36px + var(--safe-t)) 24px calc(28px + var(--safe-b));
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
  }

  .avatar-wrap{
    width:112px;
    height:112px;
    border-radius:50%;
    padding:3px;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(217,88,78,0.6));
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    flex:none;
  }

  .avatar, .avatar-fallback{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .avatar-fallback{
    display:none;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #3a2a3d, #7a3140);
    font-family:'Cormorant Garamond', serif;
    font-size:34px;
    letter-spacing:2px;
    color:#f4f1ee;
  }

  h1.name{
    margin:18px 0 0;
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(26px, 7vw, 32px);
    letter-spacing:1px;
    text-align:center;
  }

  p.tagline{
    margin:8px 0 0;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(14px, 4vw, 16px);
    color:rgba(244,241,238,0.75);
    text-align:center;
    max-width:320px;
    line-height:1.5;
  }

  .links{
    width:100%;
    margin-top:32px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .link-group{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .link-label{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(244,241,238,0.55);
    text-align:center;
  }

  .link-row{
    display:flex;
    gap:10px;
  }

  .btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    color:#fff;
    font-family:'Poppins', sans-serif;
    font-weight:500;
    font-size:14.5px;
    padding:14px 10px;
    border-radius:14px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform .12s ease, box-shadow .12s ease;
    -webkit-user-select:none;
    user-select:none;
  }

  .btn:active{
    transform: translateY(2px) scale(0.99);
    box-shadow: 0 3px 8px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .btn svg{ width:17px; height:17px; flex:none; }

  .btn-spotify{
    background: linear-gradient(180deg, #1b5e3a 0%, #0c2c1c 100%);
  }

  .btn-youtube{
    background: linear-gradient(180deg, #d8342c 0%, #931f1a 100%);
  }

  .socials{
    display:flex;
    gap:16px;
    margin-top:34px;
  }

  .social-btn{
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(244,241,238,0.06);
    border:1.3px solid rgba(244,241,238,0.35);
    color:#f4f1ee;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }

  .social-btn:active{ transform: scale(0.92); background:rgba(244,241,238,0.14); border-color:rgba(244,241,238,0.55); }

  .social-btn svg{ width:20px; height:20px; }

  footer.foot{
    margin-top:auto;
    padding-top:30px;
    font-size:11px;
    letter-spacing:0.5px;
    color:rgba(244,241,238,0.35);
    text-align:center;
  }
</style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="stars"></div>
  <img class="bg-photo" src="background_1.png" alt="" onerror="this.remove()">
  <div class="bg-overlay"></div>

  <main class="card">

    <h1 class="name">Dan Kashtan</h1>

    <section class="links">

          </a>
        </div>
      </div>

      <div class="link-group">
        <span class="link-label">Rebirth Echoes</span>
        <div class="link-row">
          <a class="btn btn-spotify" href="https://open.spotify.com/track/6eSA5h9Uel6uKl2dFn6QwR?si=e9e2cd9b4b884e43" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M7.2 10.2c3.3-.9 6.8-.6 9.6 1"/><path d="M7.8 13c2.7-.7 5.6-.5 8 .9"/><path d="M8.4 15.6c2.1-.5 4.3-.4 6.1.6"/></svg>
            Spotify

          <a class="btn btn-youtube" href="https://www.youtube.com/watch?v=1ENer8wF8KE" target="_blank" rel="noopener">

            YouTube
          </a>
        </div>
      </div>

      <div class="link-group ep-group">
        <span class="link-label">Another Place - Full EP</span>
        <div class="link-row">
          <a class="btn btn-spotify" href="https://open.spotify.com/album/1sv0QVSLogxLfzodb2SW5T?si=H_gxH9q7TYSxpoFf6KI_wQ" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M7.2 10.2c3.3-.9 6.8-.6 9.6 1"/><path d="M7.8 13c2.7-.7 5.6-.5 8 .9"/><path d="M8.4 15.6c2.1-.5 4.3-.4 6.1.6"/></svg>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.6" y="6.2" width="18.8" height="11.6" rx="3.6"/><path d="M10.3 9.6v4.8l4.4-2.4z" fill="currentColor" stroke="none"/></svg>
            YouTube
          </a>
        </div>
      </div>

    </section>

    <div class="socials">
      <a class="social-btn" href="https://instagram.com/the_kashtan" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3.3" y="3.3" width="17.4" height="17.4" rx="5.5"/><circle cx="12" cy="12" r="4.3"/><circle cx="17.1" cy="6.9" r="0.9" fill="currentColor" stroke="none"/></svg>

      <a class="social-btn" href="https://open.spotify.com/artist/6768OkDj2Sq0nabgguOig1?si=WNAyDyykQBG7ztvs1VDsGg" target="_blank" rel="noopener" aria-label="Spotify">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M7.2 10.2c3.3-.9 6.8-.6 9.6 1"/><path d="M7.8 13c2.7-.7 5.6-.5 8 .9"/><path d="M8.4 15.6c2.1-.5 4.3-.4 6.1.6"/></svg>
      </a>
    </div>

    <footer class="foot">© 2026 Dan Kashtan</footer>

  </main>

</body>
</html>
